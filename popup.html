<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>觅源 SourceSeek</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>觅源 SourceSeek</h1>
      <div class="header-actions">
        <button id="refreshBtn" class="btn-icon" title="刷新">⟳</button>
      </div>
    </header>

    <div class="page-info" id="pageInfo">
      <span class="page-title" id="pageTitle">-</span>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="image">图片</button>
      <button class="filter-btn" data-filter="video">视频</button>
      <button class="filter-btn" data-filter="audio">音频</button>
    </div>

    <div class="stats" id="stats">
      <span id="totalCount">0 个资源</span>
      <button id="downloadAllBtn" class="btn-small">全部下载</button>
    </div>

    <div class="resource-list" id="resourceList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📡</div>
        <p>正在扫描页面资源...</p>
        <p class="hint">如果没有自动扫描，请点击刷新按钮</p>
      </div>
    </div>

    <div class="download-panel" id="downloadPanel">
      <div class="download-panel-header">
        <span class="download-panel-title" id="downloadPanelTitle">下载中...</span>
        <button class="btn-icon download-panel-close" id="downloadPanelClose">✕</button>
      </div>
      <div class="download-progress-bar">
        <div class="download-progress-fill" id="downloadProgressFill"></div>
      </div>
      <div class="download-progress-info">
        <span id="downloadProgressText">0%</span>
        <span id="downloadProgressDetail">0 / 0 片段</span>
      </div>
      <div class="download-log" id="downloadLog"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
